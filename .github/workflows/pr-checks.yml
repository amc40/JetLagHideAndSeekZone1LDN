name: PR Checks

on:
    pull_request:
        branches: [master]

jobs:
    checks:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint and format check
              run: pnpm lint:check

            - name: Type check
              run: pnpm typecheck

            - name: Build
              run: pnpm build
