<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!--
      TfL London Underground roundel.
      Red annulus (outer r=46, inner r=26) with a blue horizontal bar
      (height 28 px, centred at y=50) clipped to the outer circle.
    -->
    <clipPath id="outer">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
    <mask id="ring">
      <circle cx="50" cy="50" r="46" fill="white"/>
      <circle cx="50" cy="50" r="26" fill="black"/>
    </mask>
  </defs>

  <!-- red annulus -->
  <circle cx="50" cy="50" r="46" fill="#E32017" mask="url(#ring)"/>

  <!-- blue horizontal bar, clipped to outer circle -->
  <rect x="4" y="36" width="92" height="28" fill="#003087" clip-path="url(#outer)"/>

  <!-- thin white outer border for map legibility -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="white" stroke-width="3"/>
</svg>
